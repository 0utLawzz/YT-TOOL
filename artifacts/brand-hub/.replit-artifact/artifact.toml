kind = "web"
previewPath = "/"
title = "Bright Little Stories — Brand Hub"
version = "1.0.0"
id = "artifacts/brand-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21557

[services.development]
run = "pnpm --filter @workspace/brand-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brand-hub", "run", "build" ]
publicDir = "artifacts/brand-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21557"
BASE_PATH = "/"
